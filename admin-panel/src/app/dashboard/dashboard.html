<div class="dashboard-wrapper">

  <h1 class="title">⚡ Promptly Admin Dashboard</h1>
  <button class="logoutBtn" (click)="logout()">Logout</button>

  <!-- TABS -->
  <div class="tabs">
    <button (click)="activeTab='posts'" [class.active]="activeTab==='posts'">Posts</button>
    <button (click)="activeTab='users'" [class.active]="activeTab==='users'">Users</button>
  </div>

  <!-- POSTS -->
  <div class="section" *ngIf="activeTab === 'posts'">

    <div *ngFor="let post of posts; trackBy: trackByPostId" class="card">

      <div class="cardHeader">
        <strong>{{ post.author }}</strong>
        <span class="category">{{ post.category }}</span>
      </div>

      <!-- NORMAL -->
      <div *ngIf="editingPost !== post._id">
        <div class="text" [innerHTML]="post.text"></div>
      </div>

      <!-- EDIT -->
      <div *ngIf="editingPost === post._id">
        <textarea [(ngModel)]="post.text" class="editBox"></textarea>
      </div>

      <div class="cardFooter">
        <span class="likes">❤️ {{ post.likes }}</span>

        <div>
          <button (click)="startEditPost(post._id)">Edit</button>
          <button class="save" (click)="savePost(post)">Save</button>
          <button class="danger" (click)="deletePost(post._id)">Delete</button>
        </div>
      </div>

      <!-- COMMENTS -->
      <div class="comments" *ngIf="comments[post._id]?.length > 0">
        <p><strong>Comments:</strong></p>
        <div *ngFor="let comment of comments[post._id]; trackBy: trackByCommentId" class="comment">
          <span>{{ comment.text }}</span>
          <button class="danger small" (click)="deleteComment(comment._id)">Delete</button>
        </div>
      </div>

    </div>

  </div>

  <!-- USERS -->
  <div class="section" *ngIf="activeTab === 'users'">

    <div *ngFor="let user of users; trackBy: trackByUserId" class="card user-card">

      <!-- NORMAL -->
      <div *ngIf="editingUser !== user._id">
        <strong>{{ user.username }}</strong>
        <p class="bio">{{ user.bio }}</p>
      </div>

      <!-- EDIT -->
      <div *ngIf="editingUser === user._id">
        <input [(ngModel)]="user.username" class="editInput"/>
        <input [(ngModel)]="user.bio" class="editInput"/>
      </div>

      <div class="cardFooter">
        <button (click)="startEditUser(user._id)">Edit</button>
        <button class="save" (click)="saveUser(user)">Save</button>
        <button class="danger" (click)="deleteUser(user._id)">Delete</button>
      </div>

    </div>

  </div>

</div>
