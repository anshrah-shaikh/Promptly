<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Prompt</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/create.css">
  <link rel="stylesheet" href="css/components.css"> <!-- ✅ ADDED -->
  <link rel="stylesheet" href="css/profile.css"> <!-- ✅ ADDED -->
</head>

<body>

<div class="editorContainer">

  <h2 class="luxuryText">Create Your Prompt ✨</h2>

  <!-- TOOLBAR -->
  <div class="toolbar">

    <button onclick="format('bold')" data-cmd="bold"><b>B</b></button>
    <button onclick="format('italic')" data-cmd="italic"><i>I</i></button>
    <button onclick="format('underline')" data-cmd="underline"><u>U</u></button>
    <button onclick="format('strikeThrough')" data-cmd="strikeThrough"><s>S</s></button>

    <span class="divider"></span>

    <button onclick="format('justifyLeft')" data-cmd="justifyLeft">⬅</button>
    <button onclick="format('justifyCenter')" data-cmd="justifyCenter">⬍</button>
    <button onclick="format('justifyRight')" data-cmd="justifyRight">➡</button>

    <span class="divider"></span>

    <button onclick="format('insertUnorderedList')" data-cmd="insertUnorderedList">•</button>

  </div>

  <!-- EDITOR -->
  <div id="editor" contenteditable="true" class="editor"></div>

  <button class="postBtn" onclick="createPost()">Post</button>

</div>

<!-- ✅ FLOATING BUTTONS -->
<div class="floatingStack">

  <div class="floatingProfile"
    onclick="window.location.href='profile.html'">
    👤
  </div>

  <div class="floatingHome"
    onclick="window.location.href='index.html'">
    🏠
  </div>

</div>

<!-- SCRIPTS -->
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
  <script>
    requireAuth();
  </script>
<script src="js/posts.js"></script>
<script src="js/create.js"></script>

</body>
</html>
