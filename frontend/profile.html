<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promptly — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/modal.css">
</head>

<body>

  <h1 class="luxuryText">My Profile 👤</h1>

  <!-- PROFILE CONTENT -->
  <div class="profileContainer">
    <div id="profileInfo"></div>

    <div class="profileActions">
      <button class="primaryBtn"
        onclick="document.getElementById('editModal').classList.add('open')">
        Edit Profile
      </button>

      <button class="secondaryBtn" onclick="logout()">
        Logout
      </button>
    </div>
  </div>

  <h2 style="text-align:center; margin-top:50px;">My Prompts</h2>
  <div id="myPosts"></div>

  <!-- Floating Button -->
<div class="floatingStack">

  <div class="floatingHome"
    onclick="window.location.href='index.html'">
    🏠
  </div>

  <div class="floatingCreate"
    onclick="window.location.href='create.html'">
    ✏️
  </div>

</div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modalCard">
      <h3>Edit Profile</h3>

      <!-- BIO -->
      <input id="bioInput" placeholder="Your bio..." />

      <!-- GRADIENT INPUT -->
      <input id="avatarInput" placeholder="Choose gradient below or type #color" />

      <!-- EMOJI INPUT -->
      <input id="emojiInput" placeholder="Optional emoji (🔥 😈 ✨)" />

      <!-- GRADIENT PICKER -->
      <p style="margin-top:10px; opacity:.7;">Choose a style:</p>
      <div class="avatarPicker" id="avatarPicker"></div>

      <div class="modalButtons">
        <button class="primaryBtn" onclick="saveProfile()">
          Save Changes
        </button>

        <button class="secondaryBtn"
          onclick="document.getElementById('editModal').classList.remove('open')">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
  </script>
  <script src="js/posts.js"></script>
  <script src="js/profile.js"></script>

</body>
</html>
